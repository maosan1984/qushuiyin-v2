<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>&#x6BDB;&#x4E09;&#x51FA;&#x54C1; - &#x65E0;&#x6C34;&#x5370;&#x5FEB;&#x5200;</title>
    <style>
      :root {
        --night-top: #08111d;
        --night-mid: #0d1d31;
        --night-bottom: #172b41;
        --mist: rgba(183, 206, 223, 0.12);
        --panel: rgba(12, 20, 31, 0.7);
        --panel-border: rgba(214, 227, 240, 0.12);
        --text-main: #eef4fb;
        --text-soft: #b8c8d9;
        --accent: #d7b16f;
        --accent-strong: #e7c98d;
        --button: #1f6dff;
        --button-deep: #144cc5;
        --danger-bg: rgba(89, 34, 42, 0.75);
        --danger-text: #ffd6dd;
        --radius-xl: 34px;
        --radius-lg: 24px;
        --radius-md: 16px;
        --shadow: 0 28px 80px rgba(0, 0, 0, 0.38);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text-main);
        font-family: "FangSong", "STFangsong", "Noto Serif SC", serif;
        background:
          radial-gradient(circle at 50% 16%, rgba(214, 229, 247, 0.08), transparent 24%),
          linear-gradient(180deg, var(--night-top), var(--night-mid) 46%, var(--night-bottom));
        overflow-x: hidden;
      }

      .scene {
        position: fixed;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }

      .moon {
        position: absolute;
        top: 88px;
        left: 18%;
        width: 126px;
        height: 126px;
        margin-left: 0;
        border-radius: 50%;
        background:
          radial-gradient(circle at 34% 34%, rgba(255, 255, 255, 0.98), rgba(228, 237, 248, 0.92) 48%, rgba(202, 218, 235, 0.55) 70%, transparent 74%);
        box-shadow:
          0 0 38px rgba(205, 226, 252, 0.28),
          0 0 110px rgba(205, 226, 252, 0.18);
        opacity: 0.95;
      }

      .mist {
        position: absolute;
        left: -10%;
        width: 120%;
        border-radius: 50%;
        filter: blur(24px);
        background: var(--mist);
      }

      .mist-1 {
        top: 180px;
        height: 140px;
      }

      .mist-2 {
        top: 300px;
        height: 180px;
        background: rgba(183, 206, 223, 0.09);
      }

      .mist-3 {
        bottom: 96px;
        height: 210px;
        background: rgba(196, 214, 228, 0.1);
      }

      .mountain {
        position: absolute;
        left: -8%;
        width: 116%;
        border-radius: 50% 50% 0 0;
      }

      .mountain-back {
        bottom: 220px;
        height: 300px;
        background:
          radial-gradient(circle at 12% 100%, rgba(73, 95, 118, 0.55), transparent 34%),
          radial-gradient(circle at 42% 100%, rgba(76, 98, 121, 0.52), transparent 28%),
          radial-gradient(circle at 76% 100%, rgba(76, 98, 121, 0.45), transparent 32%);
        opacity: 0.82;
      }

      .mountain-mid {
        bottom: 120px;
        height: 350px;
        background:
          radial-gradient(circle at 10% 100%, rgba(38, 56, 77, 0.96), transparent 30%),
          radial-gradient(circle at 32% 100%, rgba(33, 50, 71, 0.94), transparent 24%),
          radial-gradient(circle at 62% 100%, rgba(31, 47, 69, 0.92), transparent 28%),
          radial-gradient(circle at 86% 100%, rgba(33, 50, 71, 0.9), transparent 26%);
      }

      .mountain-front {
        bottom: -38px;
        height: 320px;
        background:
          radial-gradient(circle at 8% 100%, rgba(11, 19, 30, 0.98), transparent 30%),
          radial-gradient(circle at 30% 100%, rgba(9, 17, 27, 0.98), transparent 26%),
          radial-gradient(circle at 52% 100%, rgba(9, 17, 27, 0.98), transparent 28%),
          radial-gradient(circle at 74% 100%, rgba(9, 17, 27, 0.98), transparent 28%),
          radial-gradient(circle at 96% 100%, rgba(8, 15, 24, 0.98), transparent 28%);
      }

      .page {
        position: relative;
        z-index: 1;
        max-width: 1180px;
        margin: 0 auto;
        padding: 54px 16px 80px;
      }

      .hero {
        text-align: center;
        padding: 30px 10px 10px;
      }

      .hero h1 {
        margin: 0 auto 28px;
        max-width: 980px;
        font-family: "STKaiti", "KaiTi", "Noto Serif SC", serif;
        font-size: clamp(40px, 6vw, 82px);
        line-height: 1.08;
        letter-spacing: 0.06em;
        font-weight: 700;
        text-shadow:
          0 4px 18px rgba(6, 11, 18, 0.65),
          0 0 30px rgba(197, 214, 235, 0.1);
      }

      .hero-copy {
        margin: 0 auto 34px;
        max-width: 1180px;
        color: var(--text-soft);
        font-size: clamp(18px, 2.2vw, 28px);
        line-height: 1.7;
        white-space: nowrap;
      }

      .panel {
        position: relative;
        max-width: 1040px;
        margin: 0 auto;
        padding: 24px;
        border-radius: var(--radius-xl);
        background:
          linear-gradient(180deg, rgba(15, 27, 42, 0.78), rgba(10, 18, 29, 0.68));
        border: 1px solid var(--panel-border);
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
      }

      .panel::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background:
          linear-gradient(120deg, rgba(231, 201, 141, 0.08), transparent 26%),
          linear-gradient(300deg, rgba(182, 203, 230, 0.08), transparent 28%);
        pointer-events: none;
      }

      .panel-top {
        position: relative;
        display: flex;
        justify-content: flex-end;
        margin-bottom: 18px;
      }

      .ribbon {
        padding: 14px 22px;
        border-radius: 999px;
        color: var(--accent-strong);
        background: rgba(215, 177, 111, 0.09);
        border: 1px solid rgba(215, 177, 111, 0.14);
        font-family: "STKaiti", "KaiTi", "Noto Serif SC", serif;
        font-size: clamp(18px, 2vw, 26px);
        font-weight: 700;
        letter-spacing: 0.04em;
        box-shadow: inset 0 0 18px rgba(215, 177, 111, 0.05);
      }

      .input-shell {
        position: relative;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: center;
      }

      input[type="url"] {
        width: 100%;
        border: 1px solid rgba(220, 229, 239, 0.08);
        outline: none;
        border-radius: 999px;
        background: rgba(243, 248, 253, 0.95);
        color: #162434;
        padding: 28px 30px;
        font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        font-size: clamp(19px, 2.2vw, 28px);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.78),
          0 18px 36px rgba(3, 7, 14, 0.16);
      }

      input[type="url"]::placeholder {
        color: #95a5b8;
      }

      button {
        min-width: 188px;
        min-height: 86px;
        border: none;
        border-radius: 999px;
        padding: 0 30px;
        color: #fff;
        cursor: pointer;
        font-family: "STKaiti", "KaiTi", "Noto Serif SC", serif;
        font-size: clamp(24px, 2.4vw, 34px);
        font-weight: 700;
        letter-spacing: 0.06em;
        background: linear-gradient(180deg, var(--button), var(--button-deep));
        box-shadow:
          inset 0 0 0 3px rgba(255, 255, 255, 0.84),
          0 16px 34px rgba(20, 76, 197, 0.38);
        transition: transform 0.18s ease, box-shadow 0.18s ease;
      }

      button:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow:
          inset 0 0 0 3px rgba(255, 255, 255, 0.88),
          0 20px 42px rgba(20, 76, 197, 0.42);
      }

      button:disabled {
        opacity: 0.78;
        cursor: not-allowed;
      }

      .error {
        margin-top: 16px;
        padding: 14px 16px;
        border-radius: var(--radius-md);
        background: var(--danger-bg);
        border: 1px solid rgba(255, 214, 221, 0.14);
        color: var(--danger-text);
        font-size: 16px;
      }

      .result {
        margin-top: 20px;
        padding: 18px;
        border-radius: var(--radius-lg);
        background: rgba(236, 243, 251, 0.97);
        color: #182637;
        border: 1px solid rgba(231, 239, 247, 0.75);
        box-shadow: 0 12px 28px rgba(3, 8, 16, 0.1);
      }

      .meta {
        margin: 0 0 10px;
        font-size: 18px;
        line-height: 1.7;
        color: #31465d;
      }

      .meta strong {
        color: #101b28;
      }

      .url {
        display: block;
        margin: 8px 0;
        word-break: break-all;
        color: #0a5ea8;
      }

      video {
        width: 100%;
        margin-top: 14px;
        border-radius: 18px;
        background: #070d15;
      }

      .download {
        display: inline-block;
        margin-top: 16px;
        padding: 14px 22px;
        border-radius: 999px;
        text-decoration: none;
        color: #3d2400;
        background: linear-gradient(180deg, #f1d39e, #d7b16f);
        font-family: "STKaiti", "KaiTi", "Noto Serif SC", serif;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.04em;
        box-shadow: 0 12px 24px rgba(159, 118, 44, 0.26);
      }

      @media (max-width: 940px) {
        .panel-top {
          justify-content: center;
        }

        .input-shell {
          grid-template-columns: 1fr;
        }

        button {
          width: 100%;
          min-height: 76px;
        }
      }

      @media (max-width: 640px) {
        .page {
          padding-top: 30px;
        }

        .moon {
          width: 94px;
          height: 94px;
          left: 10%;
          margin-left: 0;
          top: 70px;
        }

        .hero h1 {
          font-size: 34px;
        }

        .hero-copy {
          font-size: 16px;
          white-space: normal;
        }

        .panel {
          padding: 18px;
        }

        input[type="url"] {
          padding: 22px 24px;
          font-size: 18px;
        }
      }
    </style>
  </head>
  <body>
    <div class="scene" aria-hidden="true">
      <!-- wuxia-scene -->
      <div class="moon"></div>
      <div class="mist mist-1"></div>
      <div class="mist mist-2"></div>
      <div class="mist mist-3"></div>
      <div class="mountain mountain-back"></div>
      <div class="mountain mountain-mid"></div>
      <div class="mountain mountain-front"></div>
    </div>

    <main class="page">
      <section class="hero">
        <!-- no-watermark-hero -->
        <h1>&#x6BDB;&#x4E09;&#x7684;&#x65E0;&#x6C34;&#x5370;&#x5FEB;&#x5200;</h1>
        <p class="hero-copy">&#x6708;&#x4E0B;&#x5C71;&#x96FE;&#x91CC;&#xFF0C;&#x8DEF;&#x5F84;&#x5C31;&#x7559;&#x4E00;&#x6761;&#x3002;&#x628A;&#x94FE;&#x63A5;&#x4E22;&#x4E0A;&#x6765;&#xFF0C;&#x80FD;&#x64AD;&#x5C31;&#x64AD;&#xFF0C;&#x80FD;&#x4E0B;&#x5C31;&#x4E0B;&#x3002;</p>
      </section>

      <section class="panel">
        <div class="panel-top">
          <div class="ribbon">&#x652F;&#x6301;&#x6296;&#x97F3; / &#x5FEB;&#x624B; / &#x5C0F;&#x7EA2;&#x4E66;&#x7B49;&#x4E3B;&#x6D41;&#x89C6;&#x9891;</div>
        </div>

        <div class="input-shell">
          <input id="videoUrl" type="url" placeholder="&#x7C98;&#x8D34;&#x89C6;&#x9891;&#x94FE;&#x63A5;" />
          <!-- parse-cta -->
          <button id="runBtn" type="button">&#x5F00;&#x59CB;&#x89E3;&#x6790;</button>
        </div>

        <div id="errorBox"></div>
        <div id="resultBox"></div>
      </section>
    </main>

    <script type="module" src="/v2.js"></script>
  </body>
</html>
